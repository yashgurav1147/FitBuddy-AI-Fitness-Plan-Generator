<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBuddy - AI Personal Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #10b981; /* Neon Emerald */
            --accent-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-main);
        }
        .glow-circle {
            position: absolute; width: 300px; height: 300px; background: var(--accent);
            border-radius: 50%; filter: blur(150px); opacity: 0.15; top: -50px; left: -50px; z-index: 0;
        }
        .form-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }
        h2 { text-align: center; color: var(--text-main); margin-top: 0; font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
        h2 span { color: var(--accent); }
        p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 35px; font-size: 14px; font-weight: 300;}
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;}
        input, select {
            width: 100%; padding: 14px 16px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border); border-radius: 10px;
            color: var(--text-main); font-size: 15px; font-family: inherit; box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input::placeholder { color: #475569; }
        input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); background: rgba(15, 23, 42, 0.9); }
        button {
            width: 100%; padding: 16px; background-color: var(--accent); color: #ffffff;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; margin-top: 15px; transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
        }
        button:hover { background-color: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.23); }
        .admin-link { display: block; text-align: center; margin-top: 30px; color: var(--text-muted); text-decoration: none; font-size: 14px; transition: color 0.3s; }
        .admin-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="glow-circle"></div>
    <div class="form-card">
        <h2>Fit<span>Buddy</span>.</h2>
        <p class="subtitle">AI-Powered Fitness Intelligence</p>
        
        <form action="/generate-workout" method="POST">
            <div style="display: flex; gap: 15px;">
                <div class="input-group" style="flex: 2;">
                    <label>Name</label> 
                    <input type="text" name="username" placeholder="Jane Doe" required>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>User ID</label> 
                    <input type="number" name="user_id" placeholder="101" required>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <div class="input-group" style="flex: 1;">
                    <label>Age</label> 
                    <input type="number" name="age" placeholder="22" required>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Weight (kg)</label> 
                    <input type="number" name="weight" placeholder="65.5" required step="0.1">
                </div>
            </div>
            <div class="input-group">
                <label>Fitness Goal</label> 
                <input type="text" name="goal" placeholder="e.g., Hypertrophy, fat loss..." required>
            </div>
            <div class="input-group">
                <label>Intensity Level</label>
                <select name="intensity">
                    <option value="Low">Low (Recovery / Beginner)</option>
                    <option value="Medium">Medium (Hypertrophy)</option>
                    <option value="High">High (Athletic Performance)</option>
                </select>
            </div>
            <button type="submit">Initialize Protocol</button>
        </form>
        <a href="/view-all-users" class="admin-link">Access Admin Dashboard &rarr;</a>
    </div>
</body>
</html>
